---
# Resource Quota for default namespace
# Allocates 30% of cluster resources: 1.2 cores, 2.4GB memory
apiVersion: v1
kind: ResourceQuota
metadata:
  name: default-quota
  namespace: default
spec:
  hard:
    requests.cpu: "1.2"
    requests.memory: "2400Mi"
    limits.memory: "2400Mi"
    pods: "20"
    services.loadbalancers: "2"
---
# LimitRange for default namespace
# Sets max resources per pod
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: default
spec:
  limits:
  - max:
      memory: "1000Mi"
    min:
      memory: "32Mi"
    default:
      memory: "256Mi"
    defaultRequest:
      memory: "64Mi"
      cpu: "25m"
    type: Container
