---
# Resource Quota for media namespace
# Allocates 60% of cluster resources: 2.4 cores, 4.8GB memory
# This namespace contains CPU/memory-intensive workloads (Plex, qBittorrent, etc.)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: media-quota
  namespace: media
spec:
  hard:
    requests.cpu: "2.4"
    requests.memory: "4800Mi"
    limits.cpu: "2.4"
    limits.memory: "4800Mi"
    pods: "30"
    persistentvolumeclaims: "10"
---
# LimitRange for media namespace
# Sets max resources per pod
apiVersion: v1
kind: LimitRange
metadata:
  name: media-limits
  namespace: media
spec:
  limits:
  - max:
      memory: "2000Mi"
    min:
      memory: "32Mi"
    default:
      memory: "500Mi"
    defaultRequest:
      memory: "100Mi"
      cpu: "50m"
    type: Container

